{% extends "base.html" %}
{% load static %}

{% block style %}
<style>
    #main-content {
        min-height: calc(100vh - 160px);
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        position: relative;
        overflow: hidden;
    }

    .auth-bg {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        object-fit: cover;
        opacity: 0.2;
        z-index: 0;
    }

    .auth-card {
        width: 100%;
        max-width: 450px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 24px;
        padding: 40px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        position: relative;
        z-index: 10;
        margin: 20px;
    }

    .form-control {
        padding: 12px 20px;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        background: #f8fafc;
        margin-bottom: 20px;
    }

    .form-control:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }
</style>
{% endblock %}

{% block content %}
<img src="{% static 'image/home-img.jpg' %}" alt="" class="auth-bg">
<div class="container d-flex justify-content-center align-items-center">
    <div class="auth-card fade-in">
        <div class="text-center mb-4">
            <div class="logo-icon mx-auto mb-3">
                <i data-lucide="lock"></i>
            </div>
            <h2 class="fw-bold tracking-tight">{% block form-title %}{% endblock %}</h2>
            <p class="text-muted small">Ingresa tus credenciales para acceder al portal</p>
        </div>

        <form method="post" {% block form-atr %}{% endblock %}>
            {% csrf_token %}
            
            {% block form %}{% endblock %}
            
            <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold mb-3 shadow-sm" type="submit">
                Entrar al Sistema
            </button>
            
            <div class="text-center">
                <a href="{% url 'home' %}" class="btn btn-link btn-sm text-decoration-none text-muted">
                    <i data-lucide="arrow-left" class="me-1" style="width: 14px;"></i> Volver al inicio
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
