{% load static %}

<div class="container py-4">
    <div class="d-flex align-items-center mb-4">
       <h2 class="h3 mb-0 fw-bold tracking-tight">My Courses </h2>
    </div>

    <div class="row g-4">
        {% for key, value in sections.items %}
        <div class="col-lg-6">
            <div class="premium-card h-100">
                <div class="row g-0 h-100">
                    <div class="col-md-4">
                        <img src="{% static 'image/course.jpg' %}" class="img-fluid h-100 w-100 object-fit-cover" alt="Course Thumbnail">
                    </div>
                    <div class="col-md-8">
                        <div class="card-body d-flex flex-column h-100 p-4">
                            <h5 class="fw-bold mb-2">{{ value.name }}</h5>
                            <p class="text-muted small mb-4 flex-grow-1">{{ value.description|truncatechars:100 }}</p>
                            
                            <div class="mt-auto d-flex justify-content-between align-items-center">
                                <span class="badge bg-light text-dark rounded-pill px-3">Status: active</span>
                                <a href="{% url 'show_score' id=value.section_id %}" class="btn btn-outline-primary btn-sm rounded-pill px-4">
                                    Show my scores <i data-lucide="eye" class="ms-1" style="width: 14px;"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {% empty %}
        <div class="col-12 text-center py-5">
            <div class="opacity-50 mb-3">
                <i data-lucide="book-x" style="width: 48px; height: 48px;"></i>
            </div>
            <p class="lead text-muted">You didn't have any course yet.</p>
        </div>
        {% endfor %}
    </div>
</div>
